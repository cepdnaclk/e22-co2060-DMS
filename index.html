<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debate Management System | Login</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page">
    <section class="card card-animate" aria-label="Authentication">
      <div class="topIcon icon-animate" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M7 8h10M7 12h7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path
            d="M20 12c0 4.418-3.582 8-8 8-1.23 0-2.394-.277-3.435-.772L4 20l.923-3.077A7.962 7.962 0 0 1 4 12c0-4.418 3.582-8 8-8s8 3.582 8 8Z"
            stroke="currentColor" stroke-width="2" stroke-linejoin="round"
          />
        </svg>
      </div>

      <h1 class="title-animate">Debate Management System</h1>
      <p class="subtitle sub-animate" id="pageSubtitle">Sign in to access your account</p>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" id="tabSignIn" type="button">Sign In</button>
        <button class="tab" id="tabSignUp" type="button">Sign Up</button>
      </div>

      <!-- SIGN IN FORM -->
      <form id="signInForm" class="form-animate" novalidate>
        <label class="label">Username</label>
        <div class="field">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M20 21a8 8 0 1 0-16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="2"/>
            </svg>
          </span>
          <input id="siUsername" type="text" placeholder="Enter your username" autocomplete="username" required />
        </div>

        <label class="label">Password</label>
        <div class="field">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M6.5 10h11A2.5 2.5 0 0 1 20 12.5v6A2.5 2.5 0 0 1 17.5 21h-11A2.5 2.5 0 0 1 4 18.5v-6A2.5 2.5 0 0 1 6.5 10Z" stroke="currentColor" stroke-width="2"/>
            </svg>
          </span>

          <input id="siPassword" type="password" placeholder="Enter your password" autocomplete="current-password" minlength="6" required />
          <button class="eyeBtn" id="toggleSiPw" type="button" aria-label="Show password">👁</button>
        </div>

        <button class="primary" type="submit">Sign In</button>

        <!-- Social buttons -->
        <div class="divider"><span>or continue with</span></div>
        <div class="social">
          <button class="socialBtn google" type="button" data-provider="Google">
            <img src="https://www.svgrepo.com/download/475656/google-color.svg" alt="Google" />
            Continue with Google
          </button>
          <button class="socialBtn facebook" type="button" data-provider="Facebook">
            <img src="https://www.svgrepo.com/download/475647/facebook-color.svg" alt="Facebook" />
            Continue with Facebook
          </button>
          <button class="socialBtn twitter" type="button" data-provider="Twitter">
            <img src="https://www.svgrepo.com/download/475689/twitter-color.svg" alt="Twitter" />
            Continue with Twitter (X)
          </button>
        </div>

        <p class="hint" id="siHint"></p>
      </form>

      <!-- SIGN UP FORM -->
      <form id="signUpForm" class="form-animate hidden" novalidate>
        <label class="label">Full Name</label>
        <div class="field">
          <span class="icon" aria-hidden="true">🧑</span>
          <input id="suName" type="text" placeholder="Enter your full name" required />
        </div>

        <label class="label">Username</label>
        <div class="field">
          <span class="icon" aria-hidden="true">👤</span>
          <input id="suUsername" type="text" placeholder="Create a username with your mail ID" required />
        </div>

        <label class="label">Password</label>
        <div class="field">
          <span class="icon" aria-hidden="true">🔒</span>
          <input id="suPassword" type="password" placeholder="Create a password (min 6)" minlength="6" required />
          <button class="eyeBtn" id="toggleSuPw" type="button" aria-label="Show password">👁</button>
        </div>

        <label class="label">Confirm Password</label>
        <div class="field">
          <span class="icon" aria-hidden="true">✅</span>
          <input id="suConfirm" type="password" placeholder="Re-enter password" minlength="6" required />
        </div>

        <button class="primary" type="submit">Create Account</button>

        <!-- Social buttons -->
        <div class="divider"><span>or continue with</span></div>
        <div class="social">
          <button class="socialBtn google" type="button" data-provider="Google">
            <img src="https://www.svgrepo.com/download/475656/google-color.svg" alt="Google" />
            Continue with Google
          </button>
          <button class="socialBtn facebook" type="button" data-provider="Facebook">
            <img src="https://www.svgrepo.com/download/475647/facebook-color.svg" alt="Facebook" />
            Continue with Facebook
          </button>
          <button class="socialBtn twitter" type="button" data-provider="Twitter">
            <img src="https://www.svgrepo.com/download/475689/twitter-color.svg" alt="Twitter" />
            Continue with Twitter (X)
          </button>
        </div>

        <p class="hint" id="suHint"></p>
      </form>

      <!-- Bottom bar -->
      <div class="feedback" id="feedbackBar" role="status" aria-live="polite">
        <div class="fbLeft">
          <span class="fbCheck" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M20 6 9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="fbText" id="fbText">Done!</span>
        </div>
        <div class="fbActions">
          <button class="fbBtn close" id="closeBtn" type="button" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
